openapi: 3.0.0
info:
  title: 見積算出システム API
  description: ...
  version: 1.0.0
paths:
  /TEST/calc:
    post:
      summary: 工数計算
      tags:
        - calc
      operationId: calcTestApplication
      description: ...
      requestBody:
        description: ...
        required: true
        content:
          application/json:
            schema:
              description: 工数計算リクエスト
              type: object
              properties:
                projectName:
                  type: string
                  description: 案件名
                autoProductivity:
                  type: boolean
                  description: 生産性自動計算フラグ
                productivityFPPerMonth:
                  type: number
                  description: 生産性（FP/月）
                projectType:
                  type: string
                  description: 案件種別
                  enum:
                    - 'N'
                    - E
                    - R
                  x-enum-varnames:
                    - NEW
                    - ENHANCEMENT
                    - REDEVELOPMENT
                ipaValueType:
                  type: string
                  description: 使用するIPA代表値
                  enum:
                    - M
                    - A
                  x-enum-varnames:
                    - MEDIAN
                    - AVERAGE
                autoProcessRatios:
                  type: boolean
                  description: 開発工程比率自動入力フラグ
                dataFunctions:
                  type: array
                  description: ':データファンクション情報'
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        description: 名称
                      updateType:
                        type: string
                        enum: &ref_0
                          - I
                          - E
                        x-enum-varnames: &ref_1
                          - ILF
                          - EIF
                      fpValue:
                        type: number
                        description: FP
                      remarks:
                        type: string
                        description: 備考
                      selected:
                        type: boolean
                        description: 選択フラグ
                transactionFunctions:
                  type: array
                  description: トランザクションファンクション情報
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        description: 名称
                      externalInput:
                        type: number
                        description: 外部入力
                      externalOutput:
                        type: number
                        description: 外部出力
                      externalInquiry:
                        type: number
                        description: 外部照会
                      fpValue:
                        type: number
                        description: FP
                      remarks:
                        type: string
                        description: 備考
                      selected:
                        type: boolean
                        description: 選択フラグ
                processRatios:
                  type: object
                  description: 開発工程比率
                  properties:
                    basicDesign:
                      type: number
                      description: 基本設計
                    detailedDesign:
                      type: number
                      description: 詳細設計
                    implementation:
                      type: number
                      description: 製造
                    integrationTest:
                      type: number
                      description: 結合テスト
                    systemTest:
                      type: number
                      description: 総合テスト
      responses:
        '200':
          description: ...
          content:
            application/json:
              schema:
                description: 工数計算レスポンス
                type: object
                properties:
                  projectName:
                    type: string
                    description: 案件名
                  productivityFPPerMonth:
                    type: number
                    description: 生産性（FP/月）
                  dataFunctions:
                    type: array
                    description: ':データファンクション情報'
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                          description: 名称
                        updateType:
                          type: string
                          enum: *ref_0
                          x-enum-varnames: *ref_1
                        fpValue:
                          type: number
                          description: FP
                        remarks:
                          type: string
                          description: 備考
                        selected:
                          type: boolean
                          description: 選択フラグ
                  transactionFunctions:
                    type: array
                    description: トランザクションファンクション情報
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                          description: 名称
                        externalInput:
                          type: number
                          description: 外部入力
                        externalOutput:
                          type: number
                          description: 外部出力
                        externalInquiry:
                          type: number
                          description: 外部照会
                        fpValue:
                          type: number
                          description: FP
                        remarks:
                          type: string
                          description: 備考
                        selected:
                          type: boolean
                          description: 選択フラグ
                  totalFP:
                    type: number
                    description: 総FP
                  totalManMonths:
                    type: number
                    description: 工数（人月）
                  standardDurationMonths:
                    type: number
                    description: 標準工期（月）
                  processRatios:
                    type: object
                    description: 開発工程比率
                    properties:
                      basicDesign:
                        type: number
                        description: 基本設計
                      detailedDesign:
                        type: number
                        description: 詳細設計
                      implementation:
                        type: number
                        description: 製造
                      integrationTest:
                        type: number
                        description: 結合テスト
                      systemTest:
                        type: number
                        description: 総合テスト
                  displayedProcessRatios:
                    type: object
                    description: 工程別比率表示用
                    properties:
                      basicDesign:
                        type: number
                        description: 基本設計
                      detailedDesign:
                        type: number
                        description: 詳細設計
                      implementation:
                        type: number
                        description: 製造
                      integrationTest:
                        type: number
                        description: 結合テスト
                      systemTest:
                        type: number
                        description: 総合テスト
                  processFPs:
                    type: object
                    description: 開発工程FP
                    properties:
                      basicDesign:
                        type: number
                        description: 基本設計
                      detailedDesign:
                        type: number
                        description: 詳細設計
                      implementation:
                        type: number
                        description: 製造
                      integrationTest:
                        type: number
                        description: 結合テスト
                      systemTest:
                        type: number
                        description: 総合テスト
                  processManMonths:
                    type: object
                    description: 開発工程工数（人月）
                    properties:
                      basicDesign:
                        type: number
                        description: 基本設計
                      detailedDesign:
                        type: number
                        description: 詳細設計
                      implementation:
                        type: number
                        description: 製造
                      integrationTest:
                        type: number
                        description: 結合テスト
                      systemTest:
                        type: number
                        description: 総合テスト
                  processDurations:
                    type: object
                    description: 開発工程標準工期（月）
                    properties:
                      basicDesign:
                        type: number
                        description: 基本設計
                      detailedDesign:
                        type: number
                        description: 詳細設計
                      implementation:
                        type: number
                        description: 製造
                      integrationTest:
                        type: number
                        description: 結合テスト
                      systemTest:
                        type: number
                        description: 総合テスト
                  errorMessages:
                    type: array
                    description: エラーメッセージ
                    items:
                      type: string
